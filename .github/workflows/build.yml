name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile "math_coach.py"

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: AI-Math-Coach-Windows
        path: dist/*.exe
