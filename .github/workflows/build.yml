name: Build App on Mac

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest  # 这里换成了 Mac 服务器

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install PyInstaller
      run: |
        python3 -m pip install --upgrade pip
        pip3 install pyinstaller

    - name: Build App
      run: |
        # --windowed 参数会让它生成一个 .app 文件夹
        pyinstaller --onefile --windowed math_coach.py

    - name: Upload Result
      uses: actions/upload-artifact@v3
      with:
        name: MathCoach-Mac-Version
        path: dist/math_coach
