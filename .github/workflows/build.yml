name: Build EXE on Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 这里也顺便升级到 v4

    - name: Set up Python
      uses: actions/setup-python@v5  # 升级到 v5 (这是目前的稳定版)
      with:
        python-version: '3.9'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile math_coach.py

    - name: Upload Result
      uses: actions/upload-artifact@v4  # 关键点：这里必须改写成 v4
      with:
        name: MathCoach-Windows-Version
        path: dist/math_coach.exe
