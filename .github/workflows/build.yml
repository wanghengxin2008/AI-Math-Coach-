name: Build for Mac

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest  # 关键点1：切换到 Mac 服务器

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PyInstaller
      run: |
        python3 -m pip install --upgrade pip
        pip3 install pyinstaller

    - name: Build Mac App
      run: |
        # 关键点2：在 Mac 上打包，不要加 .exe 后缀
        pyinstaller --onefile math_coach.py

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: MathCoach-Mac-Version
        # 关键点3：Mac 的可执行文件通常没有后缀
        path: dist/math_coach
